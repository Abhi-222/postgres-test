---
# ====================================================================
# PLAY 1: Targets ONLY your Primary Master Database Server
# ====================================================================
- name: Deploy Secure Production PostgreSQL Primary Master
  hosts: role_primary              # <--- Matches your Terraform tag "Role = primary"
  become: yes
  vars:
    # Forces Ansible to use the local temporary key generated by the Jenkins stage
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
 
    # Passing context to your internal tasks/main.yml file variables
    postgres_cluster_role: "master"
  roles:
    - postgres_prod

# ====================================================================
# PLAY 2: Targets ONLY your High-Availability Standby Replicas
# ====================================================================
- name: Deploy Secure Production PostgreSQL Standby Replicas
  hosts: role_replica              # <--- Matches your Terraform tag "Role = replica"
  become: yes
  vars:
    # Forces Ansible to use the local temporary key generated by the Jenkins stage
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    # Passing context to your internal tasks/main.yml file variables
    postgres_cluster_role: "replica"
  roles:
    - postgres_prod

