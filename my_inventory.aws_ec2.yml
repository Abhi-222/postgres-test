---
plugin: amazon.aws.aws_ec2
regions:
  - us-east-2

# Filter out and only include running EC2 instances
filters:
  instance-state-name: [ 'running' ]

# Tell Ansible to use the Private IP to SSH into the server
hostnames:
  - private-ip-address

# Sets the correct SSH username and maps the host properly
compose:
  ansible_user: "'ubuntu'"

# Turn off the legacy tags warning that clutter your screen
include_deprecated_tags: false

# Automatically create Ansible groups based on the AWS Tags you assign to your instances
keyed_groups:
  - key: tags.Role
    prefix: role
    separator: ""
  - key: tags.Environment
    prefix: env
    separator: "_"


