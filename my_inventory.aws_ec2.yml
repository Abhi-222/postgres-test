---
plugin: amazon.aws.aws_ec2
regions:
  - us-east-2  # Change to match your AWS region

# Filter out and only include running EC2 instances
filters:
  instance-state-name: [ 'running' ]

# Tell Ansible to use the Public IP or Private IP to SSH into the server
hostnames:
  - ip-address

# Explicitly binds the connection target variable to the retrieved network interface
compose:
  ansible_host: ip_address

# Turn off the legacy tags warning that clutter your screen
include_deprecated_tags: false

# Automatically create Ansible groups based on the AWS Tags you assign to your instances
keyed_groups:
  - key: ec2_tags['Role']
    prefix: role
  - key: ec2_tags['Environment']
    prefix: env
